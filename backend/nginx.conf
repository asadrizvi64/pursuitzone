events {
    worker_connections 4096;
}

http {
    upstream api_servers {
        least_conn;
        server api:4000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=60r/s;

    server {
        listen 80;
        server_name api.pursuitzone.io;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.pursuitzone.io;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # REST API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (Socket.io)
        location /socket.io/ {
            limit_req zone=ws burst=100 nodelay;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;  # Keep alive for 24h
            proxy_send_timeout 86400;
        }

        # Stripe webhook (no rate limit, raw body needed)
        location /api/wallet/webhook {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            proxy_pass http://api_servers;
        }
    }
}
